version: 2

models:
  - name: stg_customers
    description: "Cleaned customer records (silver). Direct PII = C3."
    meta:
      classification: C3
      pii_level: direct
      retention_days: 1825
      owner_role: "Head of Operations"
      steward_role: "Data Steward — Commerce"
      source_systems: ["oltp.customers"]
      update_frequency: micro_batch_10min
      quality_tier: silver
    columns:
      - name: customer_id
        description: "Natural key of the customer (UUID). Direct identifier."
        meta:
          pii: true
          pii_category: identifier
          classification: C3
          business_definition: "Unique identifier of an individual customer."
        tests: [not_null, unique]
      - name: email
        description: "Lower-cased customer email address. Direct contact PII."
        meta:
          pii: true
          pii_category: contact
          classification: C3
          business_definition: "Customer email used for order and marketing communication."
        tests: [not_null]
      - name: first_name
        description: "Customer first name."
        meta:
          pii: true
          pii_category: contact
          classification: C3
          business_definition: "Given name of the customer."
      - name: last_name
        description: "Customer last name."
        meta:
          pii: true
          pii_category: contact
          classification: C3
          business_definition: "Family name of the customer."
      - name: country
        description: "Customer billing/shipping country."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "ISO country of the customer (market segmentation)."
      - name: city
        description: "Customer city."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "City of the customer."
      - name: consent_marketing
        description: "Marketing consent flag (RGPD)."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Whether the customer consented to marketing communication."
      - name: acquisition_source
        description: "Where the customer was first acquired."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Marketing source that first acquired the customer."
      - name: created_at
        description: "Record creation timestamp."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Timestamp the customer record was created."
      - name: updated_at
        description: "Record last-update timestamp."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Timestamp the customer record was last updated."

  - name: stg_orders
    description: "Cleaned orders (silver). Indirect PII via customer_id = C3."
    meta:
      classification: C3
      pii_level: indirect
      retention_days: 1825
      owner_role: "Head of Operations"
      steward_role: "Data Steward — Commerce"
      source_systems: ["oltp.orders"]
      update_frequency: micro_batch_10min
      quality_tier: silver
    columns:
      - name: order_id
        description: "Natural key of the order (UUID)."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Unique identifier of a customer order."
        tests: [not_null, unique]
      - name: customer_id
        description: "FK to the customer who placed the order. Indirect identifier."
        meta:
          pii: true
          pii_category: identifier
          classification: C3
          business_definition: "Customer who placed the order (indirect personal link)."
        tests: [not_null]
      - name: order_date
        description: "Order timestamp."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Date and time the order was placed."
      - name: order_day
        description: "Order date truncated to day (derived)."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Calendar day of the order, used to join the date dimension."
          transformation: "order_date cast to date."
      - name: total_amount
        description: "Total order amount in EUR. Commercially sensitive."
        meta:
          pii: false
          pii_category: financial
          classification: C2
          business_definition: "Gross monetary value of the order in EUR."
      - name: discount_amount
        description: "Discount applied to the order in EUR."
        meta:
          pii: false
          pii_category: financial
          classification: C2
          business_definition: "Total discount applied to the order in EUR."
      - name: shipping_cost
        description: "Shipping cost charged on the order in EUR."
        meta:
          pii: false
          pii_category: financial
          classification: C2
          business_definition: "Shipping fee billed on the order in EUR."
      - name: payment_status
        description: "Payment lifecycle status. No card data is stored (C2)."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Payment state of the order (paid/pending/refunded). No card data stored."
        tests:
          - accepted_values:
              values: ['paid', 'pending', 'refunded']
      - name: order_status
        description: "Fulfilment status of the order."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Fulfilment state of the order."
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'cancelled', 'pending']
      - name: acquisition_channel
        description: "Acquisition channel (defaulted to 'direct')."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Channel that drove the order, defaulted to 'direct'."
          transformation: "COALESCE(acquisition_channel, 'direct')."
      - name: created_at
        description: "Record creation timestamp."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Timestamp the order record was created."

  - name: stg_order_items
