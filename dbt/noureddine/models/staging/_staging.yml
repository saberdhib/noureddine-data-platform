          pii_category: none
          classification: C2
          business_definition: "Order the line item belongs to."
        tests: [not_null]
      - name: product_id
        description: "FK to the ordered product."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Product sold on this line item."
        tests: [not_null]
      - name: quantity
        description: "Units of the product on this line."
        meta:
          pii: false
          pii_category: none
          classification: C2
          business_definition: "Quantity of the product ordered on this line."
      - name: unit_price
        description: "Unit price in EUR. Commercially sensitive."
        meta:
          pii: false
          pii_category: financial
          classification: C2
          business_definition: "Price per unit of the product in EUR at order time."
      - name: line_total
        description: "Line total in EUR. Commercially sensitive."
        meta:
          pii: false
          pii_category: financial
          classification: C2
          business_definition: "Total value of the line (quantity x unit_price) in EUR."

