version: 2

models:
  - name: stg_customers
    description: "Cleaned customer records (silver). PII = C3."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests: [not_null]

  - name: stg_orders
    description: "Cleaned orders (silver)."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: payment_status
        tests:
          - accepted_values:
              values: ['paid', 'pending', 'refunded']
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'cancelled', 'pending']

  - name: stg_order_items
    description: "Cleaned order line items (silver)."
    columns:
      - name: order_item_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: sku
        tests: [not_null, unique]

  - name: stg_categories
    columns:
      - name: category_id
        tests: [not_null, unique]
      - name: category_name
        tests: [not_null, unique]

  - name: stg_shipments
    columns:
      - name: shipment_id
        tests: [not_null, unique]
      - name: shipment_status
        tests:
          - accepted_values:
              values: ['delivered', 'in_transit', 'pending']

  - name: stg_calendar_events
    columns:
      - name: calendar_event_id
        tests: [not_null, unique]

  - name: stg_marketing_events
    columns:
      - name: event_id
        tests: [not_null, unique]

  - name: stg_rag_conversations
    columns:
      - name: conversation_id
        tests: [not_null, unique]
