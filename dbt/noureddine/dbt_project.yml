name: 'noureddine'
version: '1.0.0'
config-version: 2

profile: 'noureddine'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Elementary uploads dbt run/test artifacts for the data-quality layer (ADR 0007).
on-run-end:
  - "{{ elementary.upload_dbt_artifacts() }}"

models:
  noureddine:
    staging:
      +schema: silver
      +materialized: view
    marts:
      +schema: gold
      +materialized: table
  # Elementary internal models live in their own schema.
  elementary:
    +schema: elementary
