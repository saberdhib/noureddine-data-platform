# Grafana dashboard provider — loads JSON dashboards from disk.
apiVersion: 1

providers:
  - name: NOUREDDINE
    orgId: 1
    folder: NOUREDDINE
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
