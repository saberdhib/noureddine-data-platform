# =============================================================================
# NOUREDDINE Data Platform — Local Stack (Bloc 2)
# Services: postgres, minio, minio-init, pgadmin, airflow
# Bring up:  infra/scripts/up.sh  (or: docker compose -f infra/docker-compose.yml up -d)
# Tear down: infra/scripts/down.sh
# Verify:    infra/scripts/healthcheck.sh
# =============================================================================

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
  AIRFLOW__WEBSERVER__SECRET_KEY: "noureddine-secret-key-bloc2"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
  AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-change_me_airflow}
  AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@noureddine.com}

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — OLTP + analytical warehouse
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: noureddine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-noureddine}
      POSTGRES_USER:     ${POSTGRES_USER:-noureddine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noureddine_user} -d ${POSTGRES_DB:-noureddine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL for Airflow metadata (separate DB in same Postgres instance
  # would conflict with init scripts, so we re-use postgres and create the
  # airflow DB via the init script — see postgres/init/00_create_airflow_db.sql)
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (Data Lake: bronze/silver/gold)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: noureddine_minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO Init — one-shot container that creates bronze/silver/gold buckets
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: noureddine_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - noureddine_net
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold &&
        echo 'Buckets bronze/silver/gold ready.' &&
        exit 0
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — PostgreSQL web UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: noureddine_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:-admin@noureddine.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Apache Airflow (Bloc 2 skeleton — LocalExecutor, DAGs mounted but empty)
  # ADR-0004: LocalExecutor + PostgreSQL backend chosen for simplicity at skeleton stage.
  # ---------------------------------------------------------------------------
  airflow:
    image: apache/airflow:2.9.1
    container_name: noureddine_airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes:
      - ../dags:/opt/airflow/dags:ro
      - ../dbt:/opt/airflow/dbt:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    networks:
      - noureddine_net
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create
          --username $$AIRFLOW_ADMIN_USERNAME
          --password $$AIRFLOW_ADMIN_PASSWORD
          --firstname Admin
          --lastname NOUREDDINE
          --role Admin
          --email $$AIRFLOW_ADMIN_EMAIL
          2>/dev/null || true &&
        airflow webserver &
        airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Data Simulator — Bloc 3 (SIM_MODE=history|drip)
  # history: one-shot backfill of ~3 years data then exits
  # drip:    continuous injection every DRIP_INTERVAL_SECONDS
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    container_name: noureddine_simulator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SIM_MODE: ${SIM_MODE:-history}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-noureddine_user}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-noureddine}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio}
      BRONZE_BUCKET: bronze
      DRIP_INTERVAL_SECONDS: ${DRIP_INTERVAL_SECONDS:-10}
      SIM_N_CUSTOMERS: ${SIM_N_CUSTOMERS:-15000}
      SIM_N_PRODUCTS: ${SIM_N_PRODUCTS:-300}
      SIM_N_ORDERS: ${SIM_N_ORDERS:-20000}
    networks:
      - noureddine_net
    profiles:
      - simulator

  # ---------------------------------------------------------------------------
  # Grafana — pipeline monitoring dashboards (Postgres datasource only, ADR 0008)
  # In production AWS the equivalent would be CloudWatch; Grafana is free/self-hosted.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: noureddine_grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      # Pass PG creds so datasource provisioning can interpolate them
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-noureddine}
      POSTGRES_USER: ${POSTGRES_USER:-noureddine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Named volumes & network
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
  airflow_logs:
  grafana_data:

networks:
  noureddine_net:
    driver: bridge
