# =============================================================================
# NOUREDDINE Data Platform — Local Stack (Bloc 2)
# Services: postgres, minio, minio-init, pgadmin, airflow
# Bring up:  infra/scripts/up.sh  (or: docker compose -f infra/docker-compose.yml up -d)
# Tear down: infra/scripts/down.sh
# Verify:    infra/scripts/healthcheck.sh
# =============================================================================

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
  AIRFLOW__WEBSERVER__SECRET_KEY: "noureddine-secret-key-bloc2"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
  AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-change_me_airflow}
  AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@noureddine.com}
  # Bloc 4: DB access for the ML/monitoring DAGs + drift thresholds.
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-noureddine}
  POSTGRES_USER: ${POSTGRES_USER:-noureddine_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
  DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.5}
  MAPE_THRESHOLD: ${MAPE_THRESHOLD:-0.30}
  # Bloc 4: install the ML/monitoring deps into the Airflow image at startup
  # so retrain_model / monitor_model tasks can run (laptop-friendly, no custom image).
  _PIP_ADDITIONAL_REQUIREMENTS: "lightgbm pandas numpy scikit-learn shap scipy sqlalchemy psycopg2-binary joblib matplotlib pyarrow evidently"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — OLTP + analytical warehouse
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: noureddine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-noureddine}
      POSTGRES_USER:     ${POSTGRES_USER:-noureddine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noureddine_user} -d ${POSTGRES_DB:-noureddine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL for Airflow metadata (separate DB in same Postgres instance
  # would conflict with init scripts, so we re-use postgres and create the
  # airflow DB via the init script — see postgres/init/00_create_airflow_db.sql)
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (Data Lake: bronze/silver/gold)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: noureddine_minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO Init — one-shot container that creates bronze/silver/gold buckets
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: noureddine_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - noureddine_net
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold &&
        echo 'Buckets bronze/silver/gold ready.' &&
        exit 0
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — PostgreSQL web UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: noureddine_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:-admin@noureddine.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Apache Airflow (Bloc 2 skeleton — LocalExecutor, DAGs mounted but empty)
  # ADR-0004: LocalExecutor + PostgreSQL backend chosen for simplicity at skeleton stage.
  # ---------------------------------------------------------------------------
  airflow:
    image: apache/airflow:2.9.1
    container_name: noureddine_airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    volumes:
      - ../dags:/opt/airflow/dags:ro
      - ../dbt:/opt/airflow/dbt:ro
      - airflow_logs:/opt/airflow/logs
      # Bloc 4: the ML package + monitoring code + shared models, importable by the DAGs.
      - ../ml:/opt/airflow/ml
      - ../monitoring:/opt/airflow/monitoring
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    networks:
      - noureddine_net
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create
          --username $$AIRFLOW_ADMIN_USERNAME
          --password $$AIRFLOW_ADMIN_PASSWORD
          --firstname Admin
          --lastname NOUREDDINE
          --role Admin
          --email $$AIRFLOW_ADMIN_EMAIL
          2>/dev/null || true &&
        airflow webserver &
        airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Data simulator (Bloc 3) — single stateful catch-up process.
  # Bootstraps ~3y of history on first run, then catches up to NOW() every
  # CATCH_UP_INTERVAL_SECONDS. Writes to oltp + bronze (MinIO).
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: ..
      dockerfile: simulator/Dockerfile
    image: noureddine/simulator:bloc3
    container_name: noureddine_simulator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-noureddine_user}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-noureddine}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio}
      BRONZE_BUCKET: bronze
      CATCH_UP_INTERVAL_SECONDS: ${CATCH_UP_INTERVAL_SECONDS:-600}
    networks:
      - noureddine_net

  # ---------------------------------------------------------------------------
  # FastAPI — model serving (Bloc 4). Loads ml/models/current.pkl (read-only),
  # reads gold for forecast history. API key required on /predict and /retrain.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: noureddine/api:bloc4
    container_name: noureddine_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-noureddine}
      POSTGRES_USER:     ${POSTGRES_USER:-noureddine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
      API_KEY:           ${API_KEY:-noureddine-dev-key}
    volumes:
      # production model is mounted read-only (atomic promotion happens elsewhere)
      - ../ml/models:/app/ml/models:ro
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Streamlit — business app (Bloc 4). Calls FastAPI for forecasts; read-only
  # gold/inventory/calendar from Postgres. Business only (monitoring is Grafana).
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ..
      dockerfile: streamlit/Dockerfile
    image: noureddine/streamlit:bloc4
    container_name: noureddine_streamlit
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-noureddine}
      POSTGRES_USER:     ${POSTGRES_USER:-noureddine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
      API_URL:           http://api:8000
      API_KEY:           ${API_KEY:-noureddine-dev-key}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

  # ---------------------------------------------------------------------------
  # Grafana — observability (Bloc 3 pipeline health + Bloc 4 "Model Health").
  # Datasource + dashboards provisioned from infra/grafana.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: noureddine_grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      NOUREDDINE_DB_HOST: postgres
      NOUREDDINE_DB_NAME:     ${POSTGRES_DB:-noureddine}
      NOUREDDINE_DB_USER:     ${POSTGRES_USER:-noureddine_user}
      NOUREDDINE_DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - noureddine_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Named volumes & network
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
  airflow_logs:
  grafana_data:

networks:
  noureddine_net:
    driver: bridge
